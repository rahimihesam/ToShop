<!DOCTYPE html>
<html lang="en">

    <title>ثبت نام</title>

<body>

    <div id="register">

                    ;">

                        <ul>
                            <li><a href="../index.html"><i class="fa fa-home"></i></a></li>

                            <li><a href="#"><i class="fab fa-linkedin-in"></i></a></li>
                        </ul>

                                 </button>

                        </div>
                            
                            <div class="form-item">

                    </div>
                    <div class="auth-login">

                        <div class="login-content">

                            </p>
